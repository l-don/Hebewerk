<!-- Main App Container -->
<div class="min-h-screen bg-gradient-dark flex flex-col md:flex-row relative">

  <!-- Confetti Canvas Hook for Level Ups -->
  <div id="confetti-container" class="fixed inset-0 pointer-events-none z-50 overflow-hidden"></div>

  <!-- Sidebar Navigation (Desktop) -->
  @if (isAuthenticated()) {
    <aside class="hidden md:flex flex-col w-64 glass-card border-r border-slate-800/60 p-6 shrink-0 relative z-30">
      <!-- App title -->
      <div class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 rounded-xl bg-gradient-accent flex items-center justify-center glow-mint">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-950" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <div>
          <span class="font-display font-extrabold text-lg text-gradient tracking-wider block">HEBEWERK</span>
          <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Version 1.0 (MVP)</span>
        </div>
      </div>

      <!-- User Profile summary -->
      @if (currentUser(); as user) {
        <div class="flex items-center gap-3 p-3 rounded-xl bg-slate-900/40 border border-slate-800/40 mb-8">
          <img [src]="user.photoURL" class="w-10 h-10 rounded-full border border-neon-cyan bg-slate-800" alt="Avatar" />
          <div class="min-w-0 flex-1">
            <h4 class="text-sm font-semibold truncate text-white">{{ user.displayName }}</h4>
            <div class="flex items-center gap-1.5 mt-0.5">
              <span class="text-[10px] px-1.5 py-0.5 rounded bg-neon-mint/10 text-neon-mint font-bold uppercase">Level {{ user.stats.level }}</span>
            </div>
          </div>
        </div>
      }

      <!-- Nav links -->
      <nav class="space-y-2 flex-1">
        <a 
          routerLink="/dashboard" 
          routerLinkActive="glass-card-active border-neon-cyan/20 text-neon-cyan shadow-sm"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-900/50 transition-all font-medium border border-transparent"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
          </svg>
          <span>Dashboard</span>
        </a>

        <a 
          routerLink="/plans" 
          routerLinkActive="glass-card-active border-neon-cyan/20 text-neon-cyan shadow-sm"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-900/50 transition-all font-medium border border-transparent"
        >
          <!-- Dumbbell Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v2a2 2 0 01-2 2H5a2 2 0 01-2-2v-2a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
          </svg>
          <span>Trainingspläne</span>
        </a>

        <a 
          routerLink="/history" 
          routerLinkActive="glass-card-active border-neon-cyan/20 text-neon-cyan shadow-sm"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-900/50 transition-all font-medium border border-transparent"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>Verlauf</span>
        </a>
      </nav>

      <!-- Logout -->
      <button 
        (click)="logout()"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:text-red-300 hover:bg-red-950/20 transition-all font-semibold border border-transparent mt-auto"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Abmelden</span>
      </button>
    </aside>
  }

  <!-- Main Content Area -->
  <main class="flex-1 min-w-0 relative z-10 pb-20 md:pb-0">
    <router-outlet></router-outlet>
  </main>

  <!-- Bottom Navigation Bar (Mobile only) -->
  @if (isAuthenticated()) {
    <nav class="md:hidden fixed bottom-0 left-0 right-0 glass-card border-t border-slate-800/80 px-4 py-2 flex justify-around items-center z-40">
      <a 
        routerLink="/dashboard" 
        routerLinkActive="text-neon-mint"
        class="flex flex-col items-center gap-0.5 text-slate-400 active:scale-95 transition-all py-1 px-3"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5.5 w-5.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
        </svg>
        <span class="text-[10px] font-semibold">Dashboard</span>
      </a>

      <a 
        routerLink="/plans" 
        routerLinkActive="text-neon-mint"
        class="flex flex-col items-center gap-0.5 text-slate-400 active:scale-95 transition-all py-1 px-3"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5.5 w-5.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v2a2 2 0 01-2 2H5a2 2 0 01-2-2v-2a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
        <span class="text-[10px] font-semibold">Pläne</span>
      </a>

      <a 
        routerLink="/history" 
        routerLinkActive="text-neon-mint"
        class="flex flex-col items-center gap-0.5 text-slate-400 active:scale-95 transition-all py-1 px-3"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5.5 w-5.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="text-[10px] font-semibold">Verlauf</span>
      </a>

      <button 
        (click)="logout()"
        class="flex flex-col items-center gap-0.5 text-red-400 active:scale-95 transition-all py-1 px-3"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5.5 w-5.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span class="text-[10px] font-semibold">Logout</span>
      </button>
    </nav>
  }
</div>
